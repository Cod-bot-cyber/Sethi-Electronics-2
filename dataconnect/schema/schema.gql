type User @table {
  email: String!
  role: String!
  displayName: String
  phoneNumber: String
}

type Product @table {
  name: String!
  price: Float!
  stockQuantity: Int!
  description: String
  imageUrl: String
  category: String
}

type CartItem @table {
  quantity: Int!
  user: User!
  product: Product!
}

type Order @table {
  totalAmount: Float!
  status: String!
  shippingAddress: String
  user: User!
}

type OrderItem @table {
  priceAtPurchase: Float!
  quantity: Int!
  order: Order!
  product: Product!
}